const PouchGraphic = ({ type, color, material, text, font, size = "md" }) => {
  const isDark = color === '#E91E63';
  const textColor = isDark ? '#FFFFFF' : '#475569';
  
  const renderPouchShape = () => {
    switch(type) {
      case 'box':
        return (
          <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-xl">
            <path d="M40 80 L160 80 L170 140 L30 140 Z" fill={color} stroke="rgba(0,0,0,0.05)" strokeWidth="1" />
            <path d="M40 80 L160 80 L160 70 L40 70 Z" fill="rgba(0,0,0,0.03)" />
            <rect x="70" y="65" width="60" height="4" rx="2" fill="#FDA4AF" />
            {text && (
              <text x="100" y="115" textAnchor="middle" fill={textColor} style={{ fontFamily: font, fontSize: '14px', fontWeight: 'bold', opacity: 0.8 }}>
                {text}
              </text>
            )}
          </svg>
        );
      case 'string':
        return (
          <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-xl">
            <path d="M50 160 Q50 170 100 170 Q150 170 150 160 L160 80 Q100 60 40 80 Z" fill={color} stroke="rgba(0,0,0,0.05)" strokeWidth="1" />
            <path d="M45 85 Q100 65 155 85" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2" strokeDasharray="4 2" />
            <circle cx="100" cy="70" r="4" fill="#F43F5E" />
            {text && (
              <text x="100" y="130" textAnchor="middle" fill={textColor} style={{ fontFamily: font, fontSize: '14px', fontWeight: 'bold', opacity: 0.8 }}>
                {text}
              </text>
            )}
          </svg>
        );
      default: // flat
        return (
          <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-xl">
            <rect x="40" y="60" width="120" height="100" rx="12" fill={color} stroke="rgba(0,0,0,0.05)" strokeWidth="1" />
            <rect x="40" y="60" width="120" height="12" rx="4" fill="rgba(0,0,0,0.03)" />
            <rect x="80" y="63" width="40" height="4" rx="2" fill="#FDA4AF" />
            {text && (
              <text x="100" y="115" textAnchor="middle" fill={textColor} style={{ fontFamily: font, fontSize: '14px', fontWeight: 'bold', opacity: 0.8 }}>
                {text}
              </text>
            )}
          </svg>
        );
    }
  };

  return (
    <div className="relative w-full h-full flex items-center justify-center p-4">
      <div className={`absolute inset-0 opacity-10 pointer-events-none ${material === 'canvas' ? 'bg-[radial-gradient(#000_1px,transparent_1px)] bg-[size:6px_6px]' : material === 'velvet' ? 'bg-gradient-to-br from-white/30 to-black/5' : ''}`}></div>
      {renderPouchShape()}
    </div>
  );
};

              <span>파우치의 모양을 골라볼까요?</span>
            </h3>
            <div className="grid gap-4">
              {POUCH_TYPES.map(type => (
                <button 
                  key={type.id}
                  onClick={() => setCustomPouch({...customPouch, type})}
                  className={`p-6 rounded-[2rem] border-2 text-left transition-all flex items-center justify-between group ${customPouch.type.id === type.id ? 'border-rose-500 bg-rose-50/50' : 'border-slate-100 bg-white hover:border-rose-200'}`}
                >
                  <div className="flex items-center space-x-5">
                    <div className="w-16 h-16 rounded-2xl bg-slate-50 overflow-hidden flex-shrink-0 border border-slate-100 group-hover:scale-110 transition-transform">
                       <PouchGraphic type={type.id} color="#ffffff" material="cotton" />
                    </div>
                    <div>
                      <div className="font-trendy text-xl">{type.name}</div>
                      <div className="text-sm text-slate-400 font-serif-kr">{type.description}</div>
                    </div>
                  </div>
                  <div className="font-trendy text-lg">+{type.price.toLocaleString()}원</div>
                </button>
              ))}
            </div>
          </section>

          {/* Step 2: Color */}
          <section>
            <h3 className="text-2xl font-trendy mb-8 flex items-center space-x-4">
              <span className="w-10 h-10 bg-rose-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-rose-100">2</span>
              <span>원하는 색을 담아보세요</span>
            </h3>
            <div className="grid grid-cols-5 gap-6">
              {COLORS.map(color => (
                <button 
                  key={color.name}
                  onClick={() => setCustomPouch({...customPouch, color})}
                  className="flex flex-col items-center group space-y-3"
                >
                  <div 
                    className={`w-full aspect-square rounded-full border-4 transition-all shadow-inner relative ${customPouch.color.name === color.name ? 'border-rose-500 scale-110' : 'border-white'}`} 
                    style={{ backgroundColor: color.hex }}
                  >
                    {customPouch.color.name === color.name && <div className="absolute inset-0 flex items-center justify-center text-rose-500"><CheckCircle size={20} /></div>}
                  </div>
                  <span className={`text-xs font-bold ${customPouch.color.name === color.name ? 'text-rose-500' : 'text-slate-400'}`}>
                    {color.name}
                  </span>
                </button>
              ))}
            </div>
          </section>

          {/* Step 3: Material & Size */}
          <section className="grid sm:grid-cols-2 gap-10">
            <div className="space-y-6">
              <h3 className="text-xl font-trendy flex items-center space-x-3">
                <span className="w-8 h-8 bg-rose-500 text-white rounded-xl flex items-center justify-center">3</span>
                <span>소재 선택</span>
              </h3>
              <div className="space-y-3">
                {MATERIALS.map(m => (
                  <button 
                    key={m.id}
                    onClick={() => setCustomPouch({...customPouch, material: m})}
                    className={`w-full p-4 rounded-2xl border-2 text-sm font-bold transition-all ${customPouch.material.id === m.id ? 'bg-rose-500 text-white border-rose-500' : 'bg-white text-slate-500 border-slate-100 hover:border-rose-100'}`}
                  >
                    {m.name} {m.extra > 0 && `(+${m.extra.toLocaleString()})`}
                  </button>
                ))}
              </div>
            </div>
            <div className="space-y-6">
              <h3 className="text-xl font-trendy flex items-center space-x-3">
                <span className="w-8 h-8 bg-rose-500 text-white rounded-xl flex items-center justify-center">4</span>
                <span>사이즈</span>
              </h3>
              <div className="space-y-3">
                {SIZES.map(s => (
                  <button 
                    key={s.id}
                    onClick={() => setCustomPouch({...customPouch, size: s})}
                    className={`w-full p-4 rounded-2xl border-2 text-sm font-bold transition-all ${customPouch.size.id === s.id ? 'bg-rose-500 text-white border-rose-500' : 'bg-white text-slate-500 border-slate-100 hover:border-rose-100'}`}
                  >
                    {s.name} {s.extra > 0 && `(+${s.extra.toLocaleString()})`}
                  </button>
                ))}
              </div>
            </div>
          </section>

          {/* Step 4: Text */}
          <section>
            <h3 className="text-2xl font-trendy mb-8 flex items-center space-x-4">
              <span className="w-10 h-10 bg-rose-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-rose-100">5</span>
              <span>나만의 문구 새기기</span>
            </h3>
            <div className="bg-rose-50/50 p-8 rounded-[2.5rem] border border-rose-100 space-y-6">
              <input 
                type="text"
                placeholder="문구를 입력하세요 (최대 12자)"
                maxLength={12}
                value={customPouch.text}
                onChange={(e) => setCustomPouch({...customPouch, text: e.target.value})}
                className="w-full p-5 bg-white rounded-2xl border-none focus:ring-2 focus:ring-rose-300 outline-none text-xl font-trendy shadow-sm"
              />
              <div className="flex flex-wrap gap-3">
                {[
                  { id: 'serif', label: 'Classic Serif' },
                  { id: 'sans', label: 'Modern Sans' },
                  { id: 'cursive', label: 'Lovely Pen' }
                ].map(f => (
                  <button 
                    key={f.id} 
                    onClick={() => setCustomPouch({...customPouch, font: f.id})}
                    className={`px-6 py-2.5 rounded-full text-sm font-bold transition-all border-2 ${customPouch.font === f.id ? 'bg-rose-500 text-white border-rose-500 shadow-lg' : 'bg-white text-slate-400 border-rose-50 hover:border-rose-200'}`}
                    style={{ fontFamily: f.id }}
                  >
                    {f.label}
                  </button>
                ))}
              </div>
            </div>
          </section>

          {/* Summary Card */}
          <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden group">
            <div className="absolute -top-20 -right-20 w-64 h-64 bg-rose-500 rounded-full blur-[100px] opacity-20"></div>
            <div className="flex flex-col sm:flex-row justify-between items-center gap-6 relative z-10">
              <div className="text-center sm:text-left">
                <p className="text-rose-300 text-xs font-bold uppercase tracking-widest mb-1">Final Estimation</p>
                <div className="text-5xl font-trendy">{totalPrice.toLocaleString()}<span className="text-xl ml-1">원</span></div>
              </div>
              <button 
                onClick={() => setView('checkout')}
                className="w-full sm:w-auto bg-rose-500 hover:bg-rose-600 text-white px-12 py-5 rounded-[1.5rem] text-2xl font-trendy transition-all transform hover:scale-105 active:scale-95 shadow-xl shadow-rose-900/50 flex items-center justify-center space-x-3"
              >
                <span>제작 주문하기</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    setLoading(true);
    setTimeout(() => {

        id: `ORD-${Date.now().toString().slice(-4)}`,
        item: `${customPouch.color.name} ${customPouch.type.name}`,
        status: '주문완료',
        date: new Date().toISOString().split('T')[0],
        price: totalPrice + 3000
      });
    }, 1500);
  };

  return (
    <div className="max-w-4xl mx-auto px-4 py-20 animate-in fade-in duration-500">
      <h2 className="text-4xl font-trendy text-center mb-16">주문/결제</h2>

        <div className="md:col-span-3 space-y-10">

            <div className="grid gap-4">
              <div className="grid grid-cols-2 gap-4">
                <input className="p-4 bg-rose-50/30 rounded-2xl border-none text-sm font-serif-kr" placeholder="받는 분 성함" />
                <input className="p-4 bg-rose-50/30 rounded-2xl border-none text-sm font-serif-kr" placeholder="연락처" />
              </div>
              <input className="p-4 bg-rose-50/30 rounded-2xl border-none text-sm font-serif-kr" placeholder="주소" />
              <input className="p-4 bg-rose-50/30 rounded-2xl border-none text-sm font-serif-kr" placeholder="상세 주소" />
            </div>
          </div>
          <div className="bg-white rounded-[2rem] p-8 border border-rose-50 shadow-sm space-y-6">
            <h3 className="font-trendy text-2xl flex items-center gap-3"><CreditCard size={24} className="text-rose-500" /> 결제 수단</h3>
            <div className="grid grid-cols-3 gap-4 font-trendy">
              <button className="flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-rose-500 bg-rose-50">
                <span className="text-xs">카드 결제</span>
              </button>
              <button className="flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-slate-50 hover:border-rose-200">
                <span className="text-xs">무통장 입금</span>
              </button>
              <button className="flex flex-col items-center justify-center p-5 rounded-2xl border-2 border-slate-50 hover:border-rose-200">
                <span className="text-xs">네이버페이</span>
              </button>
            </div>
          </div>
        </div>
        <div className="md:col-span-2">
          <div className="bg-rose-500 text-white rounded-[2.5rem] p-10 sticky top-32 shadow-2xl shadow-rose-200">
             <h3 className="font-trendy text-2xl mb-8">주문 요약</h3>
             <div className="space-y-6 mb-8 text-sm font-serif-kr">
               <div className="flex justify-between opacity-80"><span>주문 상품</span><span>{totalPrice.toLocaleString()}원</span></div>
               <div className="flex justify-between opacity-80"><span>배송비</span><span>+ 3,000원</span></div>
               <div className="pt-6 border-t border-white/20 flex justify-between text-2xl font-trendy">
                 <span>총 결제금액</span>
                 <span>{(totalPrice + 3000).toLocaleString()}원</span>

function LoginView({ setUser, setView }) {
  const [isSignup, setIsSignup] = useState(false);

  return (
    <div className="max-w-md mx-auto px-4 py-32 animate-in fade-in scale-95 duration-500">
      <div className="bg-white rounded-[3rem] p-12 border border-rose-50 shadow-2xl text-center relative overflow-hidden">
        <div className="absolute top-0 left-0 w-full h-3 bg-rose-500"></div>
        <h2 className="text-4xl font-trendy mb-4 text-slate-900">{isSignup ? '처음 뵙겠습니다!' : '다시 만났네요!'}</h2>
        <p className="text-slate-400 mb-12 text-sm font-serif-kr">당신의 취향을 기록하기 위해 로그인해 주세요.</p>
        
        <div className="space-y-4 mb-10">
          {isSignup && <input className="w-full p-5 bg-rose-50/50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-rose-200 font-serif-kr" placeholder="이름" />}
          <input className="w-full p-5 bg-rose-50/50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-rose-200 font-serif-kr" placeholder="이메일" />
          <input className="w-full p-5 bg-rose-50/50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-rose-200 font-serif-kr" type="password" placeholder="비밀번호" />
        </div>

        <button 
          onClick={() => { setUser({ name: '사용자' }); setView('home'); }}
          className="w-full bg-rose-500 text-white py-5 rounded-[1.5rem] font-trendy text-2xl mb-8 hover:bg-rose-600 transition-all shadow-xl shadow-rose-100"
        >
          {isSignup ? '회원가입' : '시작하기'}
        </button>

        <button onClick={() => setIsSignup(!isSignup)} className="text-sm font-bold text-rose-300 hover:text-rose-500 transition-colors">
          {isSignup ? '이미 회원이신가요?' : '아직 계정이 없으신가요?'}
        </button>
      </div>
    </div>
  );
}
